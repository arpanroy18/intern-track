<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Tracker</title>
    <link rel="stylesheet" href="public/css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            InternTrack
        </div>
        <div>
            <button class="btn" onclick="clearAllData()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                Clear Data
            </button>
        </div>
    </header>

    <div class="container">
        <div class="stats-container">
            <div class="stat-card">
                <h3>Applications</h3>
                <p id="total-applications">0</p>
            </div>
            <div class="stat-card">
                <h3>Interviews Received</h3>
                <p id="total-interviews">0</p>
            </div>
            <div class="stat-card">
                <h3>Offers</h3>
                <p id="total-offers">0</p>
            </div>
            <div class="stat-card">
                <h3>Interview Rate</h3>
                <p id="response-rate">0%</p>
            </div>
        </div>

        <div class="main-card">
            <div class="card-header">
                <h2>Internship Applications</h2>
                <div class="button-group">
                    <button id="parse-job-btn" class="btn btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Parse Job Posting
                    </button>
                    <button id="add-application-btn" class="btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Add Application
                    </button>
                </div>
            </div>

            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" id="search-input" placeholder="Search by company, role, or notes...">
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="Applied">Applied</button>
                <button class="filter-btn" data-filter="Interview">Interview</button>
                <button class="filter-btn" data-filter="Offered">Offered</button>
                <button class="filter-btn" data-filter="Closed">Closed</button>
            </div>

            <div class="responsive-table">
                <table>
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Role</th>
                            <th>Date Applied</th>
                            <th>Status</th>
                            <th>Last Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="applications-table">
                        <!-- Application rows will be inserted here -->
                    </tbody>
                </table>
            </div>

            <div id="empty-state" class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                </svg>
                <h3>No applications yet</h3>
                <p>Get started by adding your first internship application</p>
            </div>
        </div>
    </div>

    <!-- Modal for adding/editing applications -->
    <div id="application-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Application</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <form id="application-form">
                <input type="hidden" id="application-id">
                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <input type="text" id="role" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="date-applied">Date Applied</label>
                    <input type="date" id="date-applied" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" class="form-control">
                </div>
                <div class="form-group">
                    <label for="application-link">Application Link</label>
                    <input type="url" id="application-link" class="form-control" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" class="form-control" required>
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Offered">Offered</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" class="form-control" rows="3"></textarea>
                </div>
                <div class="actions">
                    <button type="submit" class="btn" id="save-btn">Save Application</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add new modal for job posting parsing -->
    <div id="job-posting-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Parse Job Posting</h2>
                <button class="close-btn" id="close-job-modal">&times;</button>
            </div>
            <div class="form-group">
                <label for="job-posting-text">Paste Job Posting Text</label>
                <textarea id="job-posting-text" class="form-control" rows="10" placeholder="Paste the complete job posting text here..." spellcheck="false"></textarea>
            </div>
            <div id="parse-result" class="form-group" style="display: none;">
                <label>Raw API Response:</label>
                <pre style="background: #f5f5f5; padding: 1rem; border-radius: 0.375rem; overflow-x: auto; white-space: pre-wrap;"></pre>
            </div>
            <div class="actions">
                <div class="button-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <button id="clear-posting-btn" class="btn btn-secondary">Clear</button>
                    <button id="parse-posting-btn" class="btn">Parse Posting</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import JavaScript modules -->
    <script type="module" src="public/js/main.js"></script>
</body>
</html>
